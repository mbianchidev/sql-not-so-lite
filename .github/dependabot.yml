version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps(go):"
    labels:
      - dependencies
      - go
    open-pull-requests-limit: 10
    groups:
      go-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps(actions):"
    labels:
      - dependencies
      - ci

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps(web):"
    labels:
      - dependencies
      - frontend
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
